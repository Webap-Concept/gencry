# Dependabot configuration for the gencry repo.
#
# Strategy:
# - Weekly cadence (Monday 08:00 Europe/Rome) — enough for security
#   without flooding the review queue.
# - Up to 10 open PRs per ecosystem so a single dump of releases doesn't
#   block everything else.
# - `versioning-strategy: increase-if-necessary` keeps semver ranges
#   tight and bumps only the lockfile when the range already covers the
#   new version (no spurious package.json edits for patch bumps).
# - Groups for low-impact families: types and lint tooling get one
#   bundled PR each, otherwise reviewing 30 separate "@types/*" PRs is
#   pointless. The React/Next family is grouped together too — those
#   versions move in lockstep and splitting them creates noisy
#   integration mismatches.
# - **Major bumps are excluded from groups** (`update-types: minor+patch`).
#   Mixing a major into a grouped PR turns the whole PR red and blocks
#   the safe minor/patch bumps that share the group. Each major opens
#   its own dedicated PR so it can be reviewed and scheduled separately.
# - Security updates are unaffected by the weekly schedule: GitHub
#   opens those automatically as soon as an advisory is published.
#
# Reviewers: Dependabot will assign labels but no specific reviewer.
# The /admin/services/dependencies dashboard surfaces the open PRs and
# their CI status so the call to merge is made there.

version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      types:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns:
          - "@types/*"
      lint:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
      react-next:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      drizzle:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns:
          - "drizzle-*"
      tailwind:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore"
      include: "scope"
