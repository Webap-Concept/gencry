name: Prices Engine — sync + snapshot (every 5min)

# Esecutore dei cron del modulo Prices Engine (vedi memory
# project_module1_prices.md). Sostituisce vercel.json crons che NON sono
# disponibili sul piano Hobby di Vercel (limit: 1/giorno, max 2 job).
#
# Latenza tipica di GitHub Actions sui cron schedulati: ±2-5 min,
# occasionalmente fino a 10-15 min sotto load. Accettabile: la route
# in `runPricesSync` ha già un early-exit che salta il run se l'ultimo
# successful è entro `modules.prices.cron_minutes`.
#
# Secrets richiesti nel repo (Settings → Secrets and variables → Actions):
#   - APP_URL       URL pubblico del deploy Vercel, es. https://app.example.com
#   - CRON_SECRET   stesso valore della env var su Vercel (deve combaciare)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Cancella il run precedente se non finito: niente accumulo se Actions è lenta
concurrency:
  group: prices-cron-frequent
  cancel-in-progress: true

jobs:
  sync:
    name: Sync prices
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger /api/cron/modules/prices/sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          # -L segue redirect (es. www → apex), -w stampa lo status code finale,
          # -o cattura body in file così lo logghiamo per diagnosi.
          status=$(curl -fsSL --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w "%{http_code}" -o /tmp/sync-resp.json \
            "$APP_URL/api/cron/modules/prices/sync")
          echo "HTTP status: $status"
          echo "Response body:"
          cat /tmp/sync-resp.json || true

  snapshot:
    name: Snapshot prices
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: sync
    steps:
      - name: Trigger /api/cron/modules/prices/snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          status=$(curl -fsSL --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w "%{http_code}" -o /tmp/snap-resp.json \
            "$APP_URL/api/cron/modules/prices/snapshot")
          echo "HTTP status: $status"
          echo "Response body:"
          cat /tmp/snap-resp.json || true
